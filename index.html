<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
  <title>UP Academic Tracker</title>
  <link rel="icon" type="image/png" href="icon.png">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f5f5f5;color:#1a1a1a;font-size:14px}
select,button,input{font-family:inherit}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#f1f1f1}
::-webkit-scrollbar-thumb{background:#c4b5b5;border-radius:3px}
.topbar{background:#7B1113;color:#fff;padding:14px 20px 10px;display:flex;flex-direction:column;align-items:center;box-shadow:0 2px 8px rgba(0,0,0,.2);text-align:center}
.topbar-logo{width:36px;height:36px;object-fit:contain;margin-bottom:5px;filter:drop-shadow(0 1px 2px rgba(0,0,0,.25))}
.app-title{font-size:20px;font-weight:800;letter-spacing:-.4px;margin-bottom:6px}
.topbar-badges{display:flex;align-items:center;justify-content:center;gap:7px;flex-wrap:wrap}
.badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:10px;letter-spacing:.4px}
.badge-gold{background:#FFC72C;color:#7B1113}
.badge-sim{background:#ff9800;color:#fff}
.badge-status{font-size:10px;font-weight:700;padding:3px 9px;border-radius:10px}
.nav{background:#5A0C0E;display:flex;gap:0;padding:0;overflow-x:auto;justify-content:center}
.nav-btn{background:transparent;color:rgba(255,255,255,.72);border:none;border-bottom:2px solid transparent;padding:9px 14px;cursor:pointer;font-size:12px;font-weight:400;transition:all .15s;white-space:nowrap}
.nav-btn.active{color:#FFC72C;border-bottom-color:#FFC72C;font-weight:600}
.nav-btn:hover:not(.active){color:rgba(255,255,255,.95);background:rgba(255,255,255,.07)}
.content{max-width:1100px;margin:0 auto;padding:20px 20px 32px}
.section-title{font-size:18px;font-weight:700;color:#7B1113;margin:0 0 16px}
.card{background:#fff;border-radius:12px;padding:16px 20px;border:1px solid #e5e7eb;margin-bottom:12px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-bottom:12px}
.stat-card{background:#fff;border-radius:10px;padding:12px 14px;border:1px solid #e5e7eb}
.stat-card .s-label{font-size:11px;color:#6b7280;margin-bottom:3px}
.stat-card .s-value{font-size:20px;font-weight:700;margin-bottom:2px}
.stat-card .s-sub{font-size:10px;color:#9ca3af;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.prog-bar{height:10px;background:#f3f4f6;border-radius:8px;overflow:hidden;display:flex;margin:6px 0}
.grade-row{display:grid;grid-template-columns:1fr auto;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;margin-bottom:5px;cursor:pointer;transition:background .1s}
.grade-row:hover{filter:brightness(.97)}
select.grade-sel{padding:4px 6px;border-radius:6px;border:1px solid #d1d5db;font-size:12px;width:130px}
.audit-chip{display:inline-flex;flex-direction:column;align-items:center;padding:5px 9px;border-radius:8px;cursor:pointer;margin:3px;transition:transform .1s;border:1px solid transparent}
.audit-chip:hover{transform:scale(1.04)}
.audit-chip .ac-code{font-size:11px;font-weight:700}
.audit-chip .ac-info{font-size:9px;opacity:.85}
.dost-alert{border-radius:12px;padding:12px 16px;margin-bottom:10px;border-width:1.5px;border-style:solid}
.flow-col{min-width:248px;flex:0 0 248px}
.flow-sem{border:1px solid #e5e7eb;padding:8px;border-radius:0 0 8px 8px}
.flow-chip{padding:5px 7px;border-radius:6px;margin-bottom:4px;cursor:pointer;border:1px solid transparent;transition:all .1s}
.flow-chip:hover{filter:brightness(.96)}
.sim-row{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-radius:8px;margin-bottom:5px}
.dost-table{width:100%;border-collapse:collapse;font-size:12px}
.dost-table th{padding:7px 10px;text-align:left;background:#f8fafc;border-bottom:1px solid #e5e7eb;font-weight:600}
.dost-table td{padding:6px 10px;border-bottom:1px solid #f3f4f6}
.detail-panel{background:#f8fafc;border-radius:8px;padding:12px 14px;border:1px solid #e2e8f0;margin-top:10px}
/* ── PLANNER STYLES ── */
.planner-years{display:flex;gap:12px;overflow-x:auto;overflow-y:visible;padding-bottom:16px;align-items:flex-start;-webkit-overflow-scrolling:touch;scroll-behavior:smooth;min-height:180px;cursor:default}
.planner-years::-webkit-scrollbar{height:8px;display:block}
.planner-years::-webkit-scrollbar-track{background:#f1f1f1;border-radius:4px}
.planner-years::-webkit-scrollbar-thumb{background:#c4b5b5;border-radius:4px;min-width:40px}
.planner-years::-webkit-scrollbar-thumb:hover{background:#7B1113}
.planner-year{min-width:220px;flex:0 0 220px}
.planner-year-hdr{background:#7B1113;color:#FFC72C;font-weight:700;font-size:12px;padding:7px 11px;border-radius:10px 10px 0 0;display:flex;justify-content:space-between;align-items:center}
.planner-sem{border:1px solid #e5e7eb;border-top:none;background:#fff}
.planner-sem:last-child{border-radius:0 0 10px 10px}
.planner-sem-hdr{padding:5px 10px;border-bottom:1px solid #f3f4f6;display:flex;justify-content:space-between;align-items:center;background:#fafafa}
.planner-sem-label{font-size:11px;font-weight:600;color:#6b7280}
.planner-units{font-size:10px;padding:2px 6px;border-radius:8px;font-weight:700}
.pu-ok{background:#dcfce7;color:#16a34a}
.pu-warn{background:#fef3c7;color:#d97706}
.pu-over{background:#fee2e2;color:#dc2626}
.planner-drop{min-height:52px;padding:5px;display:flex;flex-direction:column;gap:3px}
.planner-drop.drag-over{background:rgba(123,17,19,.06);outline:2px dashed #7B1113;outline-offset:-2px;border-radius:4px}
.planner-chip{padding:5px 8px;border-radius:7px;cursor:grab;user-select:none;border:1px solid transparent;position:relative;transition:opacity .12s}
.planner-chip:active{cursor:grabbing}
.planner-chip.is-dragging{opacity:.3}
.pc-code{font-size:11px;font-weight:700}
.pc-title{font-size:10px;color:#6b7280;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:170px}
.pc-meta{font-size:9px;color:#9ca3af;margin-top:1px}
.pc-remove{font-size:9px;padding:1px 5px;border-radius:5px;border:1px solid #e5e7eb;background:transparent;color:#9ca3af;cursor:pointer;margin-top:3px}
.pc-remove:hover{background:#fee2e2;color:#dc2626;border-color:#fca5a5}
.pc-vtag{font-size:9px;padding:1px 5px;border-radius:4px;margin-top:2px;display:inline-block}
.pc-err{background:#fee2e2;color:#dc2626}
.pc-wrn{background:#fef3c7;color:#d97706}
.planner-pool{background:#f8fafc;border:1px solid #e5e7eb;border-radius:10px;padding:10px 12px;margin-bottom:12px}
.planner-pool-title{font-size:11px;font-weight:700;color:#6b7280;margin-bottom:7px}
.planner-pool-chips{display:flex;flex-wrap:wrap;gap:5px}
.pp-chip{padding:3px 9px;border-radius:7px;cursor:grab;user-select:none;font-size:11px;font-weight:700;border:1px solid transparent}
.pp-chip:active{opacity:.6}
.planner-alert{padding:6px 10px;border-radius:8px;font-size:11px;margin-bottom:5px;display:flex;align-items:flex-start;gap:6px}
.pa-err{background:#fee2e2;color:#dc2626}
.pa-wrn{background:#fef3c7;color:#d97706}
.pa-ok{background:#dcfce7;color:#16a34a}
.planner-toolbar{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;align-items:center;justify-content:center;padding:10px 14px;background:#fff;border:1px solid #e5e7eb;border-radius:10px}
.pt-btn{padding:7px 16px;border-radius:8px;border:1px solid #d1d5db;background:#fff;color:#374151;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;white-space:nowrap}
.pt-btn:hover{background:#f3f4f6}
.pt-primary{background:#7B1113;color:#fff;border-color:#7B1113}
.pt-primary:hover{background:#5A0C0E}
.pt-grad-box{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:10px 14px;display:inline-flex;flex-direction:column;gap:2px}
.pt-grad-label{font-size:10px;color:#6b7280}
.pt-grad-val{font-size:14px;font-weight:700;color:#065f46}
/* ── LOCK SYSTEM ── */
.planner-chip.is-locked{cursor:default;border-style:solid !important;border-color:#6366f1 !important;border-width:1.5px !important;box-shadow:0 0 0 1px #e0e7ff;}
.planner-chip.is-locked .pc-title{color:#4338ca}
.lock-btn{font-size:9px;padding:1px 5px;border-radius:5px;border:1px solid #e5e7eb;background:transparent;cursor:pointer;margin-top:3px;margin-right:3px}
.lock-btn.unlocked{color:#9ca3af;border-color:#e5e7eb}
.lock-btn.unlocked:hover{background:#e0e7ff;color:#4338ca;border-color:#a5b4fc}
.lock-btn.locked{color:#4338ca;background:#e0e7ff;border-color:#a5b4fc;font-weight:700}
.lock-btn.locked:hover{background:#fee2e2;color:#dc2626;border-color:#fca5a5}
/* multi-select */
.planner-chip.is-selected{outline:2px solid #f59e0b;outline-offset:1px}
.pc-select-cb{width:12px;height:12px;cursor:pointer;margin-right:4px;accent-color:#7B1113}
/* NSTP badge */
.nstp-badge{font-size:9px;padding:1px 5px;border-radius:4px;background:#f3f4f6;color:#374151;font-weight:600;margin-left:4px}
/* sync button */
.sync-btn{background:#065f46;color:#fff;border-color:#065f46}
.sync-btn:hover{background:#047857}
/* sync-to-grades button */
.sync-grades-btn{background:#1d4ed8;color:#fff;border-color:#1d4ed8}
.sync-grades-btn:hover{background:#1e40af}
/* PE / NSTP tracker */
.pe-nstp-card{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:13px 16px;margin-bottom:10px}
.pe-nstp-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.pe-nstp-title{font-size:13px;font-weight:700;color:#374151}
.pe-nstp-progress{font-size:11px;padding:3px 9px;border-radius:8px;font-weight:700}
.pnp-ok{background:#dcfce7;color:#16a34a}
.pnp-partial{background:#fef3c7;color:#d97706}
.pnp-empty{background:#f3f4f6;color:#6b7280}
.pe-nstp-entry{display:grid;grid-template-columns:1fr auto auto;align-items:center;gap:7px;padding:6px 9px;border-radius:7px;border:1px solid #f3f4f6;margin-bottom:5px;background:#fafafa;font-size:12px}
.pe-nstp-add-form{border:1px dashed #d1d5db;border-radius:8px;padding:10px 12px;margin-top:8px}
.pe-nstp-add-form input,.pe-nstp-add-form select{padding:5px 8px;border:1px solid #d1d5db;border-radius:6px;font-size:12px;font-family:inherit}
.add-entry-btn{padding:4px 11px;border-radius:7px;border:1px solid #d1d5db;background:#fff;cursor:pointer;font-size:11px;font-weight:700;font-family:inherit}
.add-entry-btn:hover{background:#f3f4f6}
.del-entry-btn{padding:2px 7px;border-radius:5px;border:1px solid #fca5a5;background:transparent;color:#dc2626;cursor:pointer;font-size:10px;font-family:inherit}
.del-entry-btn:hover{background:#fee2e2}
/* modal overlay */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:flex;align-items:center;justify-content:center}
.modal-box{background:#fff;border-radius:14px;padding:24px 28px;max-width:480px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,.18)}
.modal-title{font-size:16px;font-weight:700;color:#7B1113;margin-bottom:12px}
.modal-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #f3f4f6;font-size:13px}
.modal-row:last-of-type{border-bottom:none}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:16px}
.modal-btn-cancel{padding:7px 18px;border-radius:8px;border:1px solid #d1d5db;background:#fff;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit}
.modal-btn-confirm{padding:7px 18px;border-radius:8px;border:none;background:#1d4ed8;color:#fff;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit}
.modal-btn-confirm:hover{background:#1e40af}
/* ── SCHOLARSHIP ENHANCEMENT STYLES ── */
.schol-tabs{display:flex;gap:0;border-bottom:2px solid #e5e7eb;margin-bottom:16px}
.schol-tab-btn{padding:8px 16px;border:none;background:transparent;color:#6b7280;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
.schol-tab-btn.active{color:#7B1113;border-bottom-color:#7B1113}
.schol-tab-btn:hover:not(.active){color:#374151;background:#f9fafb}
.status-card{border-radius:12px;padding:16px 20px;border:2px solid;margin-bottom:12px}
.status-badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.3px}
.rule-row{display:flex;flex-direction:column;gap:3px;padding:10px 0;border-bottom:1px solid #f3f4f6}
.rule-row:last-child{border-bottom:none}
.rule-label{font-size:10px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.5px}
.rule-value{font-size:12px;color:#374151}
.rule-highlight{color:#7B1113;font-weight:600}
.faq-year-badge{display:inline-block;padding:2px 9px;border-radius:8px;font-size:11px;font-weight:700;background:#fff0f0;color:#7B1113;border:1px solid #fca5a5;margin-bottom:10px}
.faq-item{padding:10px 0;border-bottom:1px solid #f3f4f6}
.faq-item:last-child{border-bottom:none}
.faq-q{font-size:12px;font-weight:700;color:#374151;margin-bottom:4px}
.faq-a{font-size:12px;color:#6b7280;line-height:1.5}
.sim-schol-box{border-radius:10px;padding:10px 14px;border:1.5px solid;margin-bottom:10px}
.details-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.detail-item{background:#f8fafc;border-radius:8px;padding:10px 12px;border:1px solid #e5e7eb}
.detail-item .di-label{font-size:10px;color:#9ca3af;margin-bottom:3px}
.detail-item .di-value{font-size:13px;font-weight:700;color:#374151}
/* ── GRADE SIMULATION WORKSPACE ── */
.gsw-card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:14px 18px;margin-bottom:12px}
.gsw-title-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.gsw-course-name{font-size:14px;font-weight:700;color:#7B1113}
.gsw-live-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-bottom:12px}
.gsw-stat{background:#f8fafc;border-radius:8px;padding:8px 10px;border:1px solid #e5e7eb}
.gsw-stat-label{font-size:10px;color:#6b7280;margin-bottom:2px}
.gsw-stat-value{font-size:16px;font-weight:700;color:#374151}
.gsw-stat-sub{font-size:10px;color:#9ca3af;margin-top:1px}
.gsw-component-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr auto;gap:6px;align-items:center;padding:5px 0;border-bottom:1px solid #f3f4f6;font-size:12px}
.gsw-component-hdr{display:grid;grid-template-columns:2fr 1fr 1fr 1fr auto;gap:6px;padding:4px 0;font-size:10px;font-weight:700;color:#9ca3af;border-bottom:1px solid #e5e7eb;margin-bottom:4px}
.gsw-input{padding:4px 7px;border:1px solid #d1d5db;border-radius:6px;font-size:12px;width:100%;font-family:inherit}
.gsw-input:focus{outline:none;border-color:#7B1113}
.gsw-del-btn{padding:2px 7px;border-radius:5px;border:1px solid #fca5a5;background:transparent;color:#dc2626;cursor:pointer;font-size:10px;font-family:inherit}
.gsw-del-btn:hover{background:#fee2e2}
.gsw-add-btn{padding:5px 11px;border-radius:7px;border:1px solid #d1d5db;background:#fff;cursor:pointer;font-size:11px;font-weight:600;font-family:inherit}
.gsw-add-btn:hover{background:#f3f4f6}
.gsw-analyze-btn{padding:6px 14px;border-radius:8px;border:none;background:#7B1113;color:#fff;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit}
.gsw-analyze-btn:hover{background:#5A0C0E}
.gsw-analysis-panel{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px 14px;margin-top:10px}
.gsw-analysis-title{font-size:12px;font-weight:700;color:#374151;margin-bottom:10px}
.gsw-target-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #f0f0f0;font-size:12px}
.gsw-target-grade{font-weight:700;color:#7B1113;min-width:50px}
.gsw-feasible{color:#16a34a;font-size:10px;font-weight:700}
.gsw-infeasible{color:#dc2626;font-size:10px;font-weight:700}
.gsw-scenario-box{border-radius:7px;padding:8px 11px;margin-top:6px;font-size:11px}
.gsw-best{background:#dcfce7;border:1px solid #86efac}
.gsw-worst{background:#fee2e2;border:1px solid #fca5a5}
.gsw-removal{background:#fef3c7;border:1px solid #fde047;margin-top:6px;border-radius:7px;padding:8px 11px;font-size:11px}
.gsw-auto-toggle{display:flex;align-items:center;gap:6px;font-size:11px;cursor:pointer}
.gsw-workspace-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px}
/* ── POLISH: transitions & hover effects ── */
.card{transition:box-shadow .18s}
.card:hover{box-shadow:0 2px 12px rgba(0,0,0,.07)}
.stat-card{transition:box-shadow .18s,transform .15s}
.stat-card:hover{box-shadow:0 3px 14px rgba(0,0,0,.09);transform:translateY(-1px)}
.nav-btn{transition:color .15s,background .15s,border-color .15s}
.schol-tab-btn{transition:color .15s,background .15s,border-color .15s}
[id^="tab-"]{animation:fadeTab .18s ease}
@keyframes fadeTab{from{opacity:.55;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}
.pt-btn{transition:background .15s,box-shadow .12s}
.audit-chip{transition:transform .12s,box-shadow .12s}
.audit-chip:hover{transform:scale(1.05);box-shadow:0 2px 8px rgba(0,0,0,.1)}
.flow-chip{transition:filter .12s,transform .1s,box-shadow .12s}
.flow-chip:hover{filter:brightness(.94);transform:translateY(-1px);box-shadow:0 2px 6px rgba(0,0,0,.1)}
/* ── RETAKE WORKFLOW STYLES ── */
.retake-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px}
.retake-modal{background:#fff;border-radius:14px;padding:22px 24px;max-width:440px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.18);border:1.5px solid #e5e7eb}
.retake-modal-title{font-size:15px;font-weight:800;color:#7B1113;margin-bottom:4px}
.retake-modal-sub{font-size:12px;color:#6b7280;margin-bottom:16px}
.retake-btn{padding:8px 18px;border-radius:8px;border:1.5px solid;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;transition:filter .1s}
.retake-btn:hover{filter:brightness(.94)}
.retake-btn-primary{background:#7B1113;color:#fff;border-color:#7B1113}
.retake-btn-outline{background:#fff;color:#7B1113;border-color:#7B1113}
.retake-btn-warn{background:#fef3c7;color:#d97706;border-color:#fde68a}
.retake-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;margin-left:5px}
.retake-badge-planned{background:#dbeafe;color:#1d4ed8}
.retake-badge-removal{background:#fef3c7;color:#d97706}
.retake-badge-passed{background:#dcfce7;color:#16a34a}
.retake-badge-failed{background:#fee2e2;color:#dc2626}
</style>
</head>
<body>
<div id="retake-modal-container"></div>
<div class="topbar">
  <img src="icon.png" alt="UP" class="topbar-logo">
  <span class="app-title">UP Academic Tracker</span>
  <div class="topbar-badges">
    <span class="badge badge-gold">BS ME 2018</span>
    <span id="sim-badge" class="badge badge-sim" style="display:none">SIMULATION MODE</span>
    <span id="dost-badge" class="badge badge-status"></span>
  </div>
</div>

<div class="nav">
  <button class="nav-btn active" onclick="showTab('dashboard')">📊 Dashboard</button>
  <button class="nav-btn" onclick="showTab('grades')">📝 Grades</button>
  <button class="nav-btn" onclick="showTab('audit')">🎓 Degree Audit</button>
  <button class="nav-btn" onclick="showTab('scholarship')">🏆 Scholarship</button>
  <button class="nav-btn" onclick="showTab('whatif')">🔮 What-If</button>
  <button class="nav-btn" onclick="showTab('flowchart')">🗺️ Flowchart</button>
  <button class="nav-btn" onclick="showTab('planner')">📅 Planner</button>
  <button class="nav-btn" onclick="showTab('gradesim')">🧮 Grade Sim</button>
</div>

function effectiveGrade(code) {
  if (STATE.simMode && STATE.simGrades[code]) return STATE.simGrades[code];
  return STATE.grades[code] || {label:"In Progress",num:null};
}

// ── RETAKE-AWARE HELPERS ──────────────────────────────────────────
function getRetakesForCourse(code) {
  return (STATE.retakeRecords||[]).filter(r => r.code === code);
}
function getRetakeGrade(retakeId) {
  return (STATE.retakeGrades||{})[retakeId] || {label:"In Progress",num:null};
}
// Most recent graded attempt — used by scholarship evaluator and audit
function getLatestValidAttempt(code) {
  const retakes = getRetakesForCourse(code).slice().sort((a,b)=>(b.createdAt||"").localeCompare(a.createdAt||""));
  for (const r of retakes) {
    const rg = getRetakeGrade(r.id);
    if (rg.num !== null) return {grade: rg, source: "retake", retakeId: r.id};
  }
  return {grade: effectiveGrade(code), source: "original", retakeId: null};
}
// True if original OR any retake has a passing grade
function isCourseEffectivelyPassed(code) {
  const g = effectiveGrade(code);
  if (g.num !== null && g.num >= 1.00 && g.num <= 3.00) return true;
  return getRetakesForCourse(code).some(r => {
    const rg = getRetakeGrade(r.id);
    return rg.num !== null && rg.num >= 1.00 && rg.num <= 3.00;
  });
}
// ── CUSTOM COURSE HELPERS ─────────────────────────────────────────
function getCustomGrade(customId) {
  return (STATE.customGrades||{})[customId] || {label:"In Progress",num:null};
}

// ── GWA: all academic courses excluding PE and NSTP, all retake attempts (additive), all custom courses ──
// GWA = weighted average of graded attempts across academic course types per semester.
function computeGWA(filter) {
  let tp=0,tu=0;
  COURSES.forEach(c => {
    if (["pe","nstp"].includes(c.type)) return; // PE and NSTP excluded from GWA
    if (filter && !filter(c)) return;
    const g = effectiveGrade(c.code);
    if (g.num !== null && g.num >= 1.00 && g.num <= 5.00) { tp += g.num * c.units; tu += c.units; }
  });
  // Each graded retake contributes SEPARATELY (additive, not replacement)
  (STATE.retakeRecords||[]).forEach(r => {
    const course = COURSES.find(c=>c.code===r.code);
    if (!course || ["pe","nstp"].includes(course.type)) return; // PE and NSTP excluded
    if (filter && !filter(course)) return;
    const rg = getRetakeGrade(r.id);
    if (rg.num !== null && rg.num >= 1.00 && rg.num <= 5.00) { tp += rg.num * course.units; tu += course.units; }
  });
  // Custom courses included in GWA (excluding pe/nstp types)
  (STATE.customCourses||[]).forEach(cc => {
    if (["pe","nstp"].includes(cc.type)) return; // PE and NSTP excluded
    const g = getCustomGrade(cc.id);
    if (g.num !== null && g.num >= 1.00 && g.num <= 5.00) { tp += g.num * cc.units; tu += cc.units; }
  });
  return tu > 0 ? tp/tu : null;
}

// ── WAG: same additive rule; custom courses excluded unless wagEligible ──
function computeWAG() {
  let tp=0,tu=0;
  COURSES.forEach(c => {
    if (["pe","nstp"].includes(c.type)) return;
    const g = effectiveGrade(c.code);
    if (g.num !== null && g.num >= 1.00 && g.num <= 3.00) { tp += g.num * c.units; tu += c.units; }
  });
  (STATE.retakeRecords||[]).forEach(r => {
    const course = COURSES.find(c=>c.code===r.code);
    if (!course || ["pe","nstp"].includes(course.type)) return;
    const rg = getRetakeGrade(r.id);
    if (rg.num !== null && rg.num >= 1.00 && rg.num <= 3.00) { tp += rg.num * course.units; tu += course.units; }
  });
  (STATE.customCourses||[]).forEach(cc => {
    if (!cc.wagEligible || ["pe","nstp"].includes(cc.type)) return;
    const g = getCustomGrade(cc.id);
    if (g.num !== null && g.num >= 1.00 && g.num <= 3.00) { tp += g.num * cc.units; tu += cc.units; }
  });
  return tu > 0 ? tp/tu : null;
}

// ── SHARED SEMESTER BUCKET BUILDER ───────────────────────────────
// Single source of truth for grouping courses into semester buckets.
// Used by BOTH Grade Manager (display) and the Scholarship evaluator
// so their per-semester GWA values are always identical.
// Returns sorted array of: {key, label, sortKey, y, s, entries:[]}
// where entries are {type:"course"|"retake"|"custom", course, retakeRecord?}
function buildSemBuckets() {
  const hasSemMap = Object.keys(STATE.semesterMap).length > 0;
  const bucketMap = {};

  const addToBucket = (key, label, sortKey, y, s, entry) => {
    if (!bucketMap[key]) bucketMap[key] = {key, label, sortKey, y, s, entries:[]};
    bucketMap[key].entries.push(entry);
  };

  // 1. Regular curriculum courses
  COURSES.forEach(c => {
    let key, label, sortKey, y, s;
    if (hasSemMap && STATE.semesterMap[c.code] && !STATE.semesterMap[c.code].isRetake) {
      const m = STATE.semesterMap[c.code];
      key = `${m.ay}||${m.sem}`; label = `${m.ay} — ${m.sem} Semester`; sortKey = m.ay + m.sem;
      y = c.year; s = c.sem;
    } else {
      key = `y${c.year}s${c.sem}`; label = `Year ${c.year} — Semester ${c.sem}`; sortKey = `A${c.year}${c.sem}`;
      y = c.year; s = c.sem;
    }
    addToBucket(key, label, sortKey, y, s, {type:"course", course:c});
  });

  // 2. Retake entries
  (STATE.retakeRecords||[]).forEach(r => {
    if (!r.placedAy || !r.placedSem) return;
    const course = COURSES.find(c=>c.code===r.code);
    if (!course) return;
    const key = `${r.placedAy}||${r.placedSem}`;
    const label = `${r.placedAy} — ${r.placedSem} Semester`;
    addToBucket(key, label, r.placedAy+r.placedSem, course.year, course.sem, {type:"retake", course, retakeRecord:r});
  });

  // 3. Custom courses
  (STATE.customCourses||[]).forEach(cc => {
    const mapKey = "custom__" + cc.id;
    const mapped = STATE.semesterMap[mapKey];
    let key, label, sortKey;
    if (mapped && mapped.ay && mapped.sem) {
      key = `${mapped.ay}||${mapped.sem}`; label = `${mapped.ay} — ${mapped.sem} Semester`; sortKey = mapped.ay + mapped.sem;
    } else {
      key = "custom_unassigned"; label = "Custom Courses (Unassigned Semester)"; sortKey = "Z_custom";
    }
    const syntheticCourse = {
      code: "custom__" + cc.id, displayCode: cc.code, title: cc.title,
      units: cc.units, type: cc.type || "custom", prereq:[], coreq:[],
      isCustom:true, customId: cc.id,
    };
    addToBucket(key, label, sortKey, 0, 0, {type:"custom", course: syntheticCourse});
  });

  return Object.values(bucketMap).sort((a,b)=>a.sortKey.localeCompare(b.sortKey));
}

// Compute sem GWA for a bucket's entries — excludes PE/NSTP (shared rule).
function computeBucketSemGwa(entries) {
  let tp=0, tu=0;
  entries.forEach(entry => {
    const c = entry.course;
    if (["pe","nstp"].includes(c.type)) return;
    let g;
    if (entry.type === "retake") g = (STATE.retakeGrades||{})[entry.retakeRecord.id] || {label:"In Progress",num:null};
    else if (entry.type === "custom") g = getCustomGrade(c.customId);
    else g = effectiveGrade(c.code);
    if (g.num !== null && g.num >= 1.00 && g.num <= 5.00) { tp += g.num * c.units; tu += c.units; }
  });
  return tu > 0 ? tp / tu : null;
}

// ── AUDIT: course is "passed" if original OR any retake is passing ──
// Returns the total units of ME-prefixed courses the student has passed.
// Excludes failed, INC (4.00), dropped, in-progress, PE, and NSTP courses.
function computePassedMEUnits() {
  return COURSES
    .filter(c => c.code.startsWith("ME ") && isCourseEffectivelyPassed(c.code))
    .reduce((s, c) => s + c.units, 0);
}

function computeAudit() {
  const passed = new Set();
  COURSES.forEach(c => { if (isCourseEffectivelyPassed(c.code)) passed.add(c.code); });
  const passedMEUnits = computePassedMEUnits();
  const me100UnitsMet = passedMEUnits >= 63;

  // Helper: a course has been "taken" if it has any grade entered (not In Progress)
  const ME113_TAKEN_REQS = ["ME 71","ME 133","ME 146","ME 152","ME 163"];
  function hasTaken(code) {
    const g = effectiveGrade(code);
    return g.label !== "In Progress";
  }
  const me113TakenMet = ME113_TAKEN_REQS.every(code => hasTaken(code));
  const me113MissingTaken = ME113_TAKEN_REQS.filter(code => !hasTaken(code));

  // First pass: compute per-course eligibility ignoring coreqs
  const rawStatus = {};
  COURSES.forEach(c => {
    const g = effectiveGrade(c.code);
    const latest = getLatestValidAttempt(c.code);
    const prereqsMet = c.prereq.every(p => passed.has(p));
    const effGrade = latest.grade;
    let status;
    if (effGrade.num !== null && effGrade.num >= 1.00 && effGrade.num <= 3.00) status = "passed";
    else if (effGrade.num === 5.00) status = "failed";
    else if (effGrade.num === 4.00) status = "inc";
    else if (g.label === "DRP") status = "dropped";
    else if (g.label !== "In Progress") status = "in_progress";
    else if (prereqsMet
      && (!(["ME 100","ME 190","ME 195"].includes(c.code)) || me100UnitsMet)
      && (c.code !== "ME 113" || me113TakenMet)) status = "available";
    else status = "blocked";
    rawStatus[c.code] = status;
  });

  // Second pass: propagate blocked status through corequisites.
  // A course is blocked if ANY of its corequisites are themselves blocked
  // (not passed and not eligible to be taken concurrently).
  // A coreq is "eligible concurrently" only if its own raw status is
  // "available" or "passed" — NOT if it's blocked/failed/inc/dropped.
  function isCoreqEligible(coreqCode) {
    if (passed.has(coreqCode)) return true; // already completed
    const rs = rawStatus[coreqCode];
    return rs === "available"; // eligible to take this sem
  }

  // Run propagation iteratively until stable (handles chains)
  let changed = true;
  const finalStatus = {...rawStatus};
  while (changed) {
    changed = false;
    COURSES.forEach(c => {
      if (finalStatus[c.code] === "passed" || finalStatus[c.code] === "failed" ||
          finalStatus[c.code] === "inc" || finalStatus[c.code] === "dropped") return;
      // Check each corequisite: if any is blocked/ineligible, this course is also blocked
      const blockedCoreq = c.coreq.filter(q => {
        if (passed.has(q)) return false; // passed already — fine
        const coreqFinal = finalStatus[q] || rawStatus[q];
        // A coreq must be "available" or "passed" to be usable concurrently
        return coreqFinal !== "available" && coreqFinal !== "passed";
      });
      if (blockedCoreq.length > 0 && finalStatus[c.code] !== "blocked") {
        finalStatus[c.code] = "blocked";
        changed = true;
      }
    });
  }

  return COURSES.map(c => {
    const g = effectiveGrade(c.code);
    const latest = getLatestValidAttempt(c.code);
    const prereqsMet = c.prereq.every(p => passed.has(p));
    const blockedByPrereq = c.prereq.filter(p => !passed.has(p));
    // Collect blocked coreqs for display (after propagation)
    const blockedCoreqs = c.coreq.filter(q => {
      if (passed.has(q)) return false;
      const s = finalStatus[q] || rawStatus[q];
      return s !== "available" && s !== "passed";
    });
    const blockedBy = [...blockedByPrereq, ...blockedCoreqs];
    // ME 100/190/195 additional stipulation: need 63 passed ME units
    const needsME100Units = ["ME 100","ME 190","ME 195"].includes(c.code) && !me100UnitsMet;
    // ME 113 additional stipulation: must have taken ME 71, ME 133, ME 146, ME 152, ME 163
    const needsME113Taken = c.code === "ME 113" && !me113TakenMet;
    return {
      ...c,
      status: finalStatus[c.code],
      blockedBy,
      prereqsMet,
      me100UnitsMet,
      passedMEUnits,
      needsME100Units,
      needsME113Taken,
      me113MissingTaken: c.code === "ME 113" ? me113MissingTaken : [],
      grade: g,
      effectiveGrade: latest.grade,
      retakeSource: latest.source,
    };
  });
}

// LEGACY WRAPPER — delegates to evaluateScholarshipStatus so all
// scholarship displays (header, dashboard, scholarship tab, what-if)
// use ONE engine. Retake grades are now visible to scholarship evaluation.
function computeDOST(audit) {
  if (!STATE.scholarship) return null;
  try {
    const result = evaluateScholarshipStatus(false);
    if (result.status === "N/A") return null;
    return {
      status: result.status,
      reasons: result.reason ? [result.reason] : ["All requirements met"],
      semData: result.semData || [],
    };
  } catch(e) {
    return {status:"CONTINUED", reasons:["Unable to evaluate"], semData:[]};
  }
}

function gradeColor(g) {
  if (!g||!g.num) return "#6b7280";
  if (g.num<=1.75) return "#16a34a";
  if (g.num<=2.50) return "#2563eb";
  if (g.num<=3.00) return "#d97706";
  if (g.num===4.00) return "#9333ea";
  return "#dc2626";
}
function statusColor(s) {
  return {passed:"#16a34a",available:"#2563eb",blocked:"#9ca3af",failed:"#dc2626",inc:"#9333ea",dropped:"#ea580c",not_started:"#d1d5db",in_progress:"#ca8a04"}[s]||"#d1d5db";
}
function statusBg(s) {
  return {passed:"#dcfce7",available:"#dbeafe",blocked:"#f3f4f6",failed:"#fee2e2",inc:"#f5f3ff",dropped:"#fff7ed",not_started:"#f9fafb",in_progress:"#fef9c3"}[s]||"#f9fafb";
}
function statusIcon(s) {
  return {passed:"✓",available:"→",blocked:"🔒",failed:"✗",inc:"⏳",dropped:"↩",not_started:"○",in_progress:"◉"}[s]||"○";
}

let currentTab = "dashboard";
function showTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.nav-btn').forEach((b,i)=>{
    const tabs=["dashboard","grades","audit","scholarship","whatif","flowchart","planner","gradesim"];
    b.classList.toggle("active",tabs[i]===tab);
  });
  document.querySelectorAll('[id^="tab-"]').forEach(el=>el.style.display="none");
  document.getElementById("tab-"+tab).style.display="block";
  renderTab(tab);
}

function renderTab(tab) {
  const el = document.getElementById("tab-"+tab);
  if (tab==="dashboard") renderDashboard(el);
  else if (tab==="grades") renderGrades(el);
  else if (tab==="audit") renderAudit(el);
  else if (tab==="scholarship") renderScholarship(el);
  else if (tab==="whatif") renderWhatIf(el);
  else if (tab==="flowchart") renderFlowchart(el);
  else if (tab==="planner") renderPlanner(el);
  else if (tab==="gradesim") renderGradeSim(el);
  updateTopBadges();
}

function updateTopBadges() {
  document.getElementById("sim-badge").style.display = STATE.simMode ? "inline" : "none";
  const badge = document.getElementById("dost-badge");
  const scholType = STATE.scholarshipType || (STATE.scholarship ? "DOST" : "None");

  if (scholType === "None") {
    badge.textContent = "No Active Scholarship";
    badge.style.background = "#f3f4f6";
    badge.style.color = "#6b7280";
    badge.style.display = "inline";
    return;
  }

  // Build label prefix based on type
  const labelPrefix = scholType === "Custom"
    ? (STATE.customScholarshipName || "Custom Scholarship")
    : scholType;

  // Get status from evaluator
  const audit = computeAudit();
  const dost = computeDOST(audit);
  const DOST_STATUS_INFO_LOCAL = {
    CONTINUED: {label:"Continued", bg:"#dcfce7", color:"#16a34a"},
    PROBATION:  {label:"Under Probation", bg:"#fef3c7", color:"#d97706"},
    PARTIAL:    {label:"Partial Allowance", bg:"#fff7ed", color:"#ea580c"},
    TERMINATED: {label:"Terminated", bg:"#fee2e2", color:"#dc2626"},
  };
  const si = DOST_STATUS_INFO_LOCAL[dost?.status] || DOST_STATUS_INFO_LOCAL["CONTINUED"];
  badge.textContent = `${labelPrefix}: ${si.label}`;
  badge.style.background = si.bg;
  badge.style.color = si.color;
  badge.style.display = "inline";
}

function renderDashboard(el) {
  const audit = computeAudit();
  const dost = computeDOST(audit);
  const gwa = computeGWA();
  const wag = computeWAG();
  let comp=0,inprog=0,fail=0,drop=0;
  COURSES.forEach(c=>{
    const g=effectiveGrade(c.code);
    if(!g||g.label==="In Progress"){inprog+=c.units;return;}
    if(g.label==="DRP"){drop+=c.units;return;}
    if(g.num===5.00){fail+=c.units;return;}
    if(g.num!==null)comp+=c.units;
  });
  const total = COURSES.reduce((s,c)=>s+c.units,0);
  const gradPct = Math.round((comp/total)*100);
  const notPassed = audit.filter(c=>c.status!=="passed"&&!["pe","nstp"].includes(c.type)).length;
  const eligible = notPassed === 0 && audit.filter(c=>c.type==="nstp"&&c.status==="passed").length>=2;
  let sc={passed:0,available:0,blocked:0,failed:0,inc:0};
  audit.forEach(c=>{if(sc[c.status]!==undefined)sc[c.status]++;});
  const honors = HONORS.find(h=>wag&&wag>=h.min&&wag<=h.max);
  const honorsShort = honors ? (honors.label.includes("Summa")?"Summa CL":honors.label.includes("Magna")?"Magna CL":"Cum Laude") : "—";

  el.innerHTML = `
  <div class="section-title">Academic Dashboard</div>
  <div class="stat-grid">
    ${sc_card("GWA",gwa?gwa.toFixed(2):"—","Cumulative","#7B1113")}
    ${sc_card("WAG",wag?wag.toFixed(2):"—","Weighted Avg Grade","#1d4ed8")}
    ${sc_card("Units",comp+"/"+total,"Total curriculum: 156","#065f46")}
    ${sc_card("Progress",gradPct+"%","Toward graduation","#7c3aed")}
    ${sc_card("Honors",honorsShort,honors?honors.label:"No threshold reached","#b45309")}
    ${sc_card("Graduation",eligible?"✓ ELIGIBLE":notPassed+" remaining",eligible?"All reqs met":"Courses to complete",eligible?"#16a34a":"#dc2626")}
  </div>
  <div class="card" style="margin-bottom:10px">
    <div style="display:flex;justify-content:space-between;margin-bottom:7px">
      <span style="font-weight:600;font-size:13px">Degree Progress — ${comp} of 156 units</span>
      <span style="font-size:12px;color:#6b7280">${gradPct}% complete</span>
    </div>
    <div class="prog-bar">
      <div style="width:${(comp/total)*100}%;background:#7B1113;transition:width .5s"></div>
      <div style="width:${(inprog/total)*100}%;background:#FFC72C;opacity:.6"></div>
      <div style="width:${(fail/total)*100}%;background:#dc2626;opacity:.7"></div>
    </div>
    <div style="display:flex;gap:14px;margin-top:6px;font-size:11px;flex-wrap:wrap">
      ${[["#7B1113","Passed ("+comp+"u)"],["#FFC72C","In Progress ("+inprog+"u)"],["#dc2626","Failed ("+fail+"u)"],["#9ca3af","Remaining ("+Math.max(0,total-comp-inprog-fail)+"u)"]].map(([c,l])=>`<span style="display:flex;align-items:center;gap:3px"><span style="width:9px;height:9px;background:${c};border-radius:2px;display:inline-block"></span>${l}</span>`).join("")}
    </div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
    <div class="card">
      <div style="font-weight:600;font-size:13px;color:#7B1113;margin-bottom:10px">Course Status Summary</div>
      ${[["✅","Passed",sc.passed,"#16a34a"],["🔓","Available to take",sc.available,"#2563eb"],["🔒","Blocked (prereqs)",sc.blocked,"#9ca3af"],["❌","Failed (retake)",sc.failed,"#dc2626"],["⏳","Incomplete (INC)",sc.inc,"#9333ea"]].map(([i,l,v,c])=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #f3f4f6;font-size:12px"><span>${i} ${l}</span><span style="font-weight:700;color:${c};font-size:14px">${v}</span></div>`).join("")}
    </div>
    <div class="card">
      <div style="font-weight:600;font-size:13px;color:#7B1113;margin-bottom:10px">Recommended Next Courses</div>
      ${audit.filter(c=>c.status==="available").slice(0,7).map(c=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid #f3f4f6"><div><span style="font-weight:700;font-size:11px;color:${TYPE_COLOR[c.type]||'#374151'}">${c.code}</span><span style="font-size:11px;color:#374151;margin-left:5px">${c.title.length>28?c.title.slice(0,28)+"…":c.title}</span></div><span style="font-size:11px;color:#6b7280">${c.units}u</span></div>`).join("") || '<div style="color:#6b7280;font-size:12px">No courses available yet</div>'}
    </div>
  </div>
  ${dost&&dost.status!=="CONTINUED"?`<div class="dost-alert" style="background:${DOST_STATUS_INFO[dost.status].bg};border-color:${DOST_STATUS_INFO[dost.status].color};margin-top:10px"><div style="font-weight:700;color:${DOST_STATUS_INFO[dost.status].color};margin-bottom:4px">⚠️ DOST Scholarship: ${DOST_STATUS_INFO[dost.status].label}</div><div style="font-size:12px;color:#374151">${dost.reasons.join(" • ")}</div></div>`:""}
  `;
}

function sc_card(label,value,sub,color) {
  return `<div class="stat-card" style="border-top:3px solid ${color}"><div class="s-label">${label}</div><div class="s-value" style="color:${color}">${value}</div><div class="s-sub" title="${sub}">${sub}</div></div>`;
}

  ccHtml += '<div style="display:flex;gap:6px">';
  ccHtml += '<button class="add-entry-btn" style="background:#1d4ed8;color:#fff;border-color:#1d4ed8" onclick="addCustomCourse()">Add Custom Course</button>';
  ccHtml += '<button class="add-entry-btn" onclick="document.getElementById(\'custom-add-form\').style.display=\'none\'">Cancel</button>';
  ccHtml += '</div></div>';
  ccHtml += '<button class="add-entry-btn" style="margin-top:6px" onclick="var f=document.getElementById(\'custom-add-form\');f.style.display=f.style.display===\'none\'?\'block\':\'none\'">+ Add Custom Course</button>';

  // ── RETAKE RECORDS PANEL (preserved as-is) ──────────────────────

function setGrade(code, label) {
  const found = GRADE_OPTIONS.find(g=>g.label===label);
  STATE.grades[code] = found || {label:"In Progress",num:null};
  saveState();
  updateTopBadges();
  // Instant refresh: always re-render the active tab so GWA updates immediately
  if (currentTab === "grades") {
    renderTab("grades");
  } else if (currentTab === "dashboard") {
    renderTab("dashboard");
  }
  // Retake workflow: trigger modal for 5.00 and 4.00
  if (found && (found.num === 5.00 || found.num === 4.00)) {
    const course = COURSES.find(c=>c.code===code);
    if (course) {
      const existing = STATE.retakeRecords.find(r=>r.code===code && r.originalGrade===label);
      if (!existing) {
        showRetakeModal(code, found.num, course);
      }
    }
  }
}

// Set grade for a specific retake attempt (by record id)
function setRetakeGrade(retakeId, label) {
  const found = GRADE_OPTIONS.find(g=>g.label===label);
  if (!STATE.retakeGrades) STATE.retakeGrades = {};
  STATE.retakeGrades[retakeId] = found || {label:"In Progress",num:null};
  // Also update retakeStatus based on grade
  const record = STATE.retakeRecords.find(r=>r.id===retakeId);
  if (record) {
    if (found && found.num !== null && found.num >= 1.00 && found.num <= 3.00) {
      record.retakeStatus = "completed";
    } else if (found && found.num !== null) {
      record.retakeStatus = "in_progress";
    }
  }
  saveState();
  updateTopBadges();
  // Instant GWA refresh
  if (currentTab === "grades") renderTab("grades");
  else if (currentTab === "dashboard") renderTab("dashboard");
}

function showRenameElectiveModal(code) {
  const course = COURSES.find(c=>c.code===code);
  if (!course) return;
  const current = STATE.electiveNames[code] || {};
  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.id = "rename-elective-modal";
  overlay.innerHTML = `<div class="modal-box">
    <div class="modal-title">✎ Rename Elective Requirement</div>
    <p style="font-size:13px;color:#6b7280;margin-bottom:12px">Renaming "${course.title}" (slot: ${code}). This still satisfies the curriculum requirement.</p>
    <div style="margin-bottom:10px">
      <div style="font-size:11px;color:#6b7280;margin-bottom:4px">Display Code (e.g. PI 100)</div>
      <input id="rename-code" value="${current.displayCode||""}" placeholder="${code}" style="padding:6px 8px;border:1px solid #d1d5db;border-radius:7px;font-size:12px;width:100%;font-family:inherit">
    </div>
    <div style="margin-bottom:14px">
      <div style="font-size:11px;color:#6b7280;margin-bottom:4px">Course Title</div>
      <input id="rename-title" value="${current.displayName||""}" placeholder="${course.title}" style="padding:6px 8px;border:1px solid #d1d5db;border-radius:7px;font-size:12px;width:100%;font-family:inherit">
    </div>
    <div class="modal-actions">
      <button class="modal-btn-cancel" onclick="document.getElementById('rename-elective-modal').remove()">Cancel</button>
      ${current.displayCode||current.displayName?`<button style="padding:7px 18px;border-radius:8px;border:1px solid #fca5a5;background:#fff;color:#dc2626;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit" onclick="clearElectiveRename('${code}')">Reset to default</button>`:""}
      <button class="modal-btn-confirm" onclick="confirmRenameElective('${code}')">Save</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
}
function confirmRenameElective(code) {
  const displayCode = document.getElementById("rename-code")?.value?.trim();
  const displayName = document.getElementById("rename-title")?.value?.trim();
  STATE.electiveNames[code] = {displayCode: displayCode||undefined, displayName: displayName||undefined};
  saveState();
  document.getElementById("rename-elective-modal")?.remove();
  renderTab(currentTab);
}
function clearElectiveRename(code) {
  delete STATE.electiveNames[code];
  saveState();
  document.getElementById("rename-elective-modal")?.remove();
  renderTab(currentTab);
}

// ── CUSTOM COURSE HELPERS ─────────────────────────────────────────
function addCustomCourse() {
  const code = document.getElementById("custom-code")?.value?.trim();
  const title = document.getElementById("custom-title")?.value?.trim() || code;
  const units = +(document.getElementById("custom-units")?.value) || 3;
  const wagEligible = document.getElementById("custom-wag")?.checked || false;
  if (!code) { alert("Please enter a course code."); return; }
  STATE.customCourses.push({id:Date.now(), code, title, units, type:"custom", wagEligible});
  saveState();
  renderTab("grades");
}
function deleteCustomCourse(id) {
  STATE.customCourses = STATE.customCourses.filter(c=>c.id!==id);
  delete STATE.customGrades[id];
  saveState();
  renderTab("grades");
}
function setCustomGrade(id, label) {
  const found = GRADE_OPTIONS.find(g=>g.label===label);
  STATE.customGrades[id] = found || {label:"In Progress",num:null};
  saveState();
  updateTopBadges();
  if (currentTab === "grades") renderTab("grades");
  else if (currentTab === "dashboard") renderTab("dashboard");
}

function renderAudit(el) {
  const audit = computeAudit();
  const notPassed = audit.filter(c=>c.status!=="passed"&&!["pe","nstp"].includes(c.type)).length;
  const eligible = notPassed===0 && audit.filter(c=>c.type==="nstp"&&c.status==="passed").length>=2;
  const failed = audit.filter(c=>c.status==="failed");

  const GROUPS = [
    {label:"Major Courses",types:["major"],icon:"🔬"},
    {label:"Mathematics",types:["math"],icon:"📐"},
    {label:"Sciences",types:["science"],icon:"⚗️"},
    {label:"GE Requirements",types:["ge"],icon:"📚"},
    {label:"Electives",types:["ge_elective","eee_elective","engg_elective","free_elective"],icon:"🎯"},
    {label:"NSTP (6 units req.)",types:["nstp"],icon:"🏫"},
    {label:"Physical Education",types:["pe"],icon:"🏃"},
  ];

  let html = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
    <div class="section-title" style="margin:0">Degree Audit</div>
    <div style="padding:7px 14px;border-radius:10px;font-weight:700;font-size:12px;background:${eligible?"#dcfce7":"#fee2e2"};color:${eligible?"#16a34a":"#dc2626"}">${eligible?"✅ Eligible to Graduate":"❌ "+notPassed+" courses remaining"}</div>
  </div>`;

  if (failed.length>0) {
    html += `<div style="background:#fee2e2;border:1px solid #fca5a5;border-radius:10px;padding:10px 14px;margin-bottom:10px"><span style="font-weight:700;color:#dc2626">Failed courses (must retake): </span>${failed.map(c=>`<span style="display:inline-block;background:#dc2626;color:#fff;font-size:10px;padding:2px 7px;border-radius:7px;margin:2px">${c.code}</span>`).join("")}</div>`;
  }

  GROUPS.forEach(g => {
    const courses = audit.filter(c=>g.types.includes(c.type));
    const passed = courses.filter(c=>c.status==="passed").length;
    const totalUnits = courses.reduce((s,c)=>s+c.units,0);
    const passedUnits = courses.filter(c=>c.status==="passed").reduce((s,c)=>s+c.units,0);

    html += `<div class="card" style="margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:9px">
        <span style="font-weight:700;font-size:13px">${g.icon} ${g.label}</span>
        <span style="font-size:11px;color:${passed===courses.length?"#16a34a":"#6b7280"}">${passed}/${courses.length} passed • ${passedUnits}/${totalUnits} units</span>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:5px">`;
    courses.forEach(c => {
      const sc = statusColor(c.status), sb = statusBg(c.status), si = statusIcon(c.status);
      const sel = STATE.selectedAudit===c.code;
      html += `<div class="audit-chip" onclick="toggleAudit('${c.code}')" style="background:${sb};border-color:${sel?sc:"transparent"};outline:${sel?"2px solid "+sc:"none"}">
        <div class="ac-code" style="color:${sc}">${si} ${c.code}</div>
        <div class="ac-info" style="color:${sc}">${c.units}u • ${c.grade?.num!==null?c.grade?.label||"—":"—"}</div>
      </div>`;
    });
    html += "</div>";

    if (STATE.selectedAudit) {
      const sel = courses.find(c=>c.code===STATE.selectedAudit);
      if (sel) {
        html += `<div class="detail-panel"><div style="display:flex;justify-content:space-between">
          <div>
            <div style="font-weight:700;font-size:14px">${sel.code} — ${sel.title}</div>
            <div style="font-size:12px;color:#6b7280;margin-top:3px">${sel.units} units | Year ${sel.year} Sem ${sel.sem} | <span style="color:${statusColor(sel.status)};font-weight:600">${sel.status.replace("_"," ")}</span></div>
            ${sel.prereq.length>0?`<div style="font-size:12px;margin-top:3px">Prerequisites: <b>${sel.prereq.join(", ")}</b></div>`:""}
            ${sel.coreq.length>0?`<div style="font-size:12px">Corequisites: <b>${sel.coreq.join(", ")}</b></div>`:""}
            ${sel.blockedBy?.length>0?`<div style="font-size:12px;color:#dc2626">Blocked by: <b>${sel.blockedBy.join(", ")}</b></div>`:""}
            ${sel.needsME100Units?`<div style="font-size:12px;color:#dc2626">⚠️ Additional Requirement: Must have passed 63 units of ME courses (${sel.passedMEUnits}/63 units met)</div>`:""}
            ${sel.needsME113Taken?`<div style="font-size:12px;color:#dc2626">⚠️ Additional Requirement: Must have taken ME 71, ME 133, ME 146, ME 152, and ME 163 (missing: ${sel.me113MissingTaken.join(", ")})</div>`:""}
          </div>
          <button onclick="STATE.selectedAudit=null;renderTab('audit')" style="background:transparent;border:none;font-size:18px;cursor:pointer;color:#9ca3af">×</button>
        </div></div>`;
      }
    }
    html += "</div>";
  });

  html += `<div class="card" style="display:flex;flex-wrap:wrap;gap:10px;font-size:11px">
    ${[["✓","Passed","#16a34a"],["→","Available","#2563eb"],["🔒","Blocked","#9ca3af"],["✗","Failed","#dc2626"],["⏳","INC","#9333ea"],["↩","Dropped","#ea580c"],["◉","In Progress","#ca8a04"]].map(([i,l,c])=>`<span style="color:${c}">${i} ${l}</span>`).join("")}
  </div>`;

  el.innerHTML = html;
}

function toggleAudit(code) {
  STATE.selectedAudit = STATE.selectedAudit===code?null:code;
  renderTab("audit");
}

// ── SCHOLARSHIP STATUS EVALUATOR ──────────────────────────────────
// Evaluates current status from grades + scholarship year rules.
// Returns {status, reason, rule, action, details, gwa, semData}
function evaluateScholarshipStatus(useSimMode) {
  const yr = STATE.yearInScholarship;
  const pd = STATE.prevDeficiency;
  const rules = SCHOL_RULES[STATE.scholarshipYear] || SCHOL_RULES["2025"];
  const gwaReq = rules.gwaReq.year1annual; // 2.75 for all current cohorts

  if (!STATE.scholarship) {
    return { status:"N/A", reason:"Not a DOST Scholar (disabled in settings).", rule:"N/A", action:"Enable scholarship in settings if applicable." };
  }

  // Gather semester data using the SAME bucket builder as Grade Manager,
  // so semGwa here exactly matches what's displayed per-semester in Grade Manager.
  const semData = [];
  const allBuckets = buildSemBuckets();

  for (const bucket of allBuckets) {
    if (bucket.key === "custom_unassigned") continue; // skip unplaced customs

    // Collect only regular curriculum courses in this bucket
    const bucketCourses = bucket.entries
      .filter(e => e.type === "course")
      .map(e => e.course);

    // Need at least 2 graded curriculum courses to count as a completed semester
    const graded = bucketCourses.filter(c => {
      const g = effectiveGrade(c.code);
      return g && g.label !== "In Progress";
    });
    if (graded.length < 2) continue;

    // Use latest valid attempt (retake-aware)
    const getG = code => getLatestValidAttempt(code).grade;
    const getOrigG = code => effectiveGrade(code);

    const fails5 = graded.filter(c=>getG(c.code).num===5.00);
    const incs4  = graded.filter(c=>getG(c.code).num===4.00);
    // PE and NSTP excluded from dropped unit count (per DOST FAQ)
    const droppedCourses = graded.filter(c=>getOrigG(c.code).label==="DRP"&&!["pe","nstp"].includes(c.type));
    const droppedU = droppedCourses.reduce((s,c)=>s+c.units,0);
    const droppedPENSTP = graded.filter(c=>getOrigG(c.code).label==="DRP"&&["pe","nstp"].includes(c.type)).reduce((s,c)=>s+c.units,0);

    // semGwa via shared helper — identical to Grade Manager display
    const semGwa = computeBucketSemGwa(bucket.entries);

    // Derive y/s from bucket's curriculum courses for the decision matrix
    const y = bucket.y || (bucketCourses[0]?.year ?? 1);
    const s = bucket.s || (bucketCourses[0]?.sem  ?? 1);

    semData.push({y, s, fails5:fails5.map(c=>c.code), incs4:incs4.map(c=>c.code), droppedU, droppedPENSTP, semGwa, gradedCount:graded.length});
  }

  if (semData.length === 0) {
    return {
      status:"CONTINUED", gwa:null, semData:[],
      reason:"No completed semesters yet. Scholarship is currently active.",
      rule:rules.gradeReqByYear[Math.min(yr,5)]||rules.gradeReqByYear[5],
      action:"Maintain GWA ≤ 2.75 and avoid failing grades.",
    };
  }

  // ── FULL DOST DECISION MATRIX ────────────────────────────────────
  // Mirrors the official DOST-SEI FAQ table (uploaded documents).
  // Evaluation order matches the FAQ's conditional structure.
  const STATUS_RANK = {CONTINUED:0,PROBATION:1,PARTIAL:2,TERMINATED:3};
  let finalStatus = "CONTINUED";
  let triggerSem = null;
  let matchedPolicy = null;

  // Track cumulative deficiencies across semesters (simulates "previous deficiency on record")
  // The FAQ checks whether a prior semester already produced a deficiency.
  let hasPriorDeficiency = pd; // starts from user-set flag
  // Count of 5.00 grades that are still UNRESOLVED (no passing retake yet),
  // accumulated across all semesters processed so far. Used for the Y3 rule:
  // if a scholar enters Y3 with 2 unresolved 5.00s and fails another course → TERMINATED.
  let cumulativeUnresolved5 = 0;

  for (let sdIdx = 0; sdIdx < semData.length; sdIdx++) {
    const sd = semData[sdIdx];
    const semYr = sd.y; // course-year of this semester
    const isGradSem = PLAN_STATE.isGraduatingSem && sdIdx === semData.length - 1;
    let semStatus = "CONTINUED";
    let policy = null;

    const f = sd.fails5.length;   // # of 5.00 grades (retake-resolved)
    const inc = sd.incs4.length;  // # of 4.00 (INC) grades
    const drp = sd.droppedU;      // academic dropped units (PE/NSTP excluded)
    const gwa = sd.semGwa;

    // ── GRADUATING SEMESTER EXCEPTION ──────────────────────────────
    // FAQ: Scholars in their final graduating semester are given special
    // consideration. A single failure does not automatically terminate if
    // the overall record is otherwise clean.
    if (isGradSem) {
      if (f >= 2) {
        // Two or more failures even in graduating sem → TERMINATED
        semStatus = "TERMINATED";
        policy = rules.deficiencyPolicy.find(p=>p.trigger==="two_fails") ||
          {rule:"2+ failures in graduating semester",action:"Consult DOST-SEI scholarship office."};
      } else if (f === 1 && hasPriorDeficiency) {
        semStatus = "PARTIAL";
        policy = {rule:"1 failure in graduating semester with prior deficiency",
          action:"Comply with partial allowance; complete requirements."};
      } else if (f === 1) {
        semStatus = "PROBATION";
        policy = {rule:"1 failure in graduating semester",
          action:"Seek DOST-SEI guidance; graduating-year exception may apply."};
      }
      // Underload in graduating sem is explicitly allowed — no warning added
    }

    // ── YEAR 1: ANNUAL EVALUATION ───────────────────────────────────
    // FAQ: Year 1 scholars are evaluated on their ANNUAL (combined) GWA.
    // Failure rules differ by semester within Year 1:
    //   Y1S1: 1 fail → PROBATION (first-offense leniency)
    //   Y1S2: 1 fail, no prior deficiency → CONTINUED (noted; annual eval absorbs it)
    //   Y1S2: 1 fail, prior deficiency already on record → PARTIAL
    else if (semYr === 1) {
      if (f >= 2) {
        // 2+ failures in any single sem → TERMINATED (applies all years)
        semStatus = "TERMINATED";
        policy = rules.deficiencyPolicy.find(p=>p.trigger==="two_fails");
      } else if (f === 1 && hasPriorDeficiency) {
        // Prior deficiency + another fail in Y1 → PARTIAL
        semStatus = "PARTIAL";
        policy = rules.deficiencyPolicy.find(p=>p.trigger==="one_fail_prev");
      } else if (f === 1 && sd.s === 1) {
        // Y1 Sem 1 only: single fail with no prior → PROBATION
        semStatus = "PROBATION";
        policy = rules.deficiencyPolicy.find(p=>p.trigger==="one_fail_y1s1");
      } else if (f === 1 && sd.s !== 1) {
        // Y1 Sem 2 (or later within Y1): single fail, no prior → CONTINUED with note
        // Annual evaluation: one fail in Sem 2 alone does not trigger formal probation
        semStatus = "CONTINUED";
        policy = {
          trigger:"one_fail_y1s2_noted",
          rule:"1 failing grade in Year 1 Sem 2 (noted; annual evaluation applies)",
          action:"No formal action yet — ensure the failed subject is retaken and passed. Annual GWA will be reviewed at end of Year 1.",
        };
      } else if (inc >= 1 && hasPriorDeficiency) {
        semStatus = "PARTIAL";
        policy = rules.deficiencyPolicy.find(p=>p.trigger==="inc_prev");
      } else if (inc >= 2) {
        // 2 INCs even without prior → probation
        semStatus = "PROBATION";
        policy = {rule:"2+ INC grades in Year 1",action:"Complete INC subjects promptly."};
      } else if (drp > 3) {
        semStatus = hasPriorDeficiency ? "PARTIAL" : "PROBATION";
        policy = rules.deficiencyPolicy.find(p=>p.trigger==="drop_gt3");
      } else if (gwa !== null && gwa > gwaReq + 0.10) {
        semStatus = "PROBATION";
        policy = rules.deficiencyPolicy.find(p=>p.trigger==="gwa_miss_big");
      } else if (gwa !== null && gwa > gwaReq) {
        // Minor GWA miss (0.01–0.10) in Year 1 → Continued with note
        semStatus = "CONTINUED";
        policy = rules.deficiencyPolicy.find(p=>p.trigger==="gwa_miss_small");
      }
    }

    // ── YEAR 2: SEMESTRAL EVALUATION ───────────────────────────────
    // FAQ: From Year 2 onwards, evaluation is per semester.
    else if (semYr === 2) {
      if (f >= 2) {
        semStatus = "TERMINATED";
        policy = rules.deficiencyPolicy.find(p=>p.trigger==="two_fails");
      } else if (f === 1 && hasPriorDeficiency) {
        semStatus = "PARTIAL";
        policy = rules.deficiencyPolicy.find(p=>p.trigger==="one_fail_prev");
      } else if (f === 1) {
        semStatus = "PROBATION";
        policy = rules.deficiencyPolicy.find(p=>p.trigger==="one_fail_y1s1");
      } else if (inc >= 2 && hasPriorDeficiency) {
        semStatus = "PARTIAL";
        policy = rules.deficiencyPolicy.find(p=>p.trigger==="inc_prev");
      } else if (inc >= 1 && hasPriorDeficiency) {
        semStatus = "PARTIAL";
        policy = rules.deficiencyPolicy.find(p=>p.trigger==="inc_prev");
      } else if (drp > 3 && hasPriorDeficiency) {
        semStatus = "PARTIAL";
        policy = rules.deficiencyPolicy.find(p=>p.trigger==="drop_gt3");
      } else if (drp > 3) {
        semStatus = "PROBATION";
        policy = rules.deficiencyPolicy.find(p=>p.trigger==="drop_gt3");
      } else if (gwa !== null && gwa > gwaReq && hasPriorDeficiency) {
        semStatus = "PARTIAL";
        policy = rules.deficiencyPolicy.find(p=>p.trigger==="gwa_miss_big");
      } else if (gwa !== null && gwa > gwaReq + 0.10) {
        semStatus = "PROBATION";
        policy = rules.deficiencyPolicy.find(p=>p.trigger==="gwa_miss_big");
      } else if (gwa !== null && gwa > gwaReq) {
        semStatus = "CONTINUED";
        policy = rules.deficiencyPolicy.find(p=>p.trigger==="gwa_miss_small");
      }
    }

    // ── YEAR 3 and YEAR 4: STRICT EVALUATION ───────────────────────
    // FAQ: 3rd-year-enjoyed and 4th-year-enjoyed scholars face stricter rules.
    // A single 5.00 with a prior deficiency on record → PARTIAL or TERMINATED.
    // Two or more 5.00s in one semester → TERMINATED (service obligation).
    // Third failing grade overall (cumulative) → TERMINATED.
    // NEW RULE: If scholar enters Year 3+ with 2 unresolved 5.00s still on record
    // (i.e. the 2 previous failed grades have NOT yet been retaken and passed)
    // and receives any additional 5.00 → TERMINATED.
    else {
      if (f >= 2) {
        // 2+ failures in one semester → always TERMINATED
        semStatus = "TERMINATED";
        policy = rules.deficiencyPolicy.find(p=>p.trigger==="two_fails");
      } else if (f >= 1 && cumulativeUnresolved5 >= 2) {
        // 3rd unresolved 5.00 in Year 3+: the 2 prior failed grades were never passed → TERMINATED
        semStatus = "TERMINATED";
        policy = {
          trigger:"third_unresolved_fail_y3",
          rule:`3rd unresolved failing grade (5.00) in Year ${semYr} — 2 previous 5.00 grades have not been retaken and passed`,
          action:"Consult DOST-SEI scholarship office immediately. Service obligation applies.",
          status:"TERMINATED",
        };
      } else if (f === 1 && hasPriorDeficiency) {
        // 1 failure + prior deficiency in 3rd/4th year → TERMINATED
        // This is the "third failing grade" scenario from the FAQ
        semStatus = "TERMINATED";
        policy = {
          trigger:"third_fail_cumulative",
          rule:"Failure with prior deficiency in Year 3/4 (cumulative termination threshold)",
          action:"Consult DOST-SEI scholarship office immediately. Service obligation may apply.",
          status:"TERMINATED",
        };
      } else if (f === 1) {
        // 1 failure, no prior deficiency → PROBATION
        semStatus = "PROBATION";
        policy = rules.deficiencyPolicy.find(p=>p.trigger==="one_fail_y1s1");
      } else if (inc >= 1 && hasPriorDeficiency) {
        semStatus = "PARTIAL";
        policy = rules.deficiencyPolicy.find(p=>p.trigger==="inc_prev");
      } else if (drp > 3 && hasPriorDeficiency) {
        semStatus = "PARTIAL";
        policy = rules.deficiencyPolicy.find(p=>p.trigger==="drop_gt3");
      } else if (drp > 3) {
        semStatus = "PROBATION";
        policy = rules.deficiencyPolicy.find(p=>p.trigger==="drop_gt3");
      } else if (gwa !== null && gwa > gwaReq && hasPriorDeficiency) {
        semStatus = "PARTIAL";
        policy = rules.deficiencyPolicy.find(p=>p.trigger==="gwa_miss_big");
      } else if (gwa !== null && gwa > gwaReq + 0.10) {
        semStatus = "PROBATION";
        policy = rules.deficiencyPolicy.find(p=>p.trigger==="gwa_miss_big");
      } else if (gwa !== null && gwa > gwaReq) {
        semStatus = "CONTINUED";
        policy = rules.deficiencyPolicy.find(p=>p.trigger==="gwa_miss_small");
      }
    }

    // Update cumulative deficiency flag: if this semester produced a deficiency,
    // mark it so subsequent semesters can escalate accordingly
    if (STATUS_RANK[semStatus] >= STATUS_RANK["PROBATION"]) {
      hasPriorDeficiency = true;
    }

    // Update the cumulative count of UNRESOLVED 5.00 failures from this semester.
    // A failure is "unresolved" if the latest valid attempt (original or retake) is
    // still 5.00 — meaning the scholar has NOT yet passed a retake for that subject.
    sd.fails5.forEach(code => {
      const latest = getLatestValidAttempt(code);
      if (latest.grade.num === 5.00) cumulativeUnresolved5++;
    });

    // Worst status across all semesters is the final result
    if (STATUS_RANK[semStatus] > STATUS_RANK[finalStatus]) {
      finalStatus = semStatus;
      triggerSem = sd;
      matchedPolicy = policy;
    }
  }

  // Build reason string
  const lastSD = semData[semData.length-1];
  let reason = "", action = "", rule = "";

  if (finalStatus === "CONTINUED") {
    reason = "No scholarship violations detected. All grade requirements are currently satisfied.";
    rule = rules.gradeReqByYear[Math.min(yr,5)] || "Passing grades in all subjects.";
    action = "Continue current academic standing. Maintain GWA ≤ 2.75 each semester.";
  } else if (matchedPolicy) {
    rule = matchedPolicy.rule;
    action = matchedPolicy.action;
    if (finalStatus === "TERMINATED") {
      reason = `Scholarship termination condition triggered: ${triggerSem?.fails5?.length||0} failing grade(s) of 5.00 in a single semester (Year ${triggerSem?.y} Sem ${triggerSem?.s}).`;
    } else if (finalStatus === "PROBATION") {
      const issues = [];
      if (triggerSem?.fails5?.length) issues.push(`${triggerSem.fails5.length} failing grade(s) of 5.00 (${triggerSem.fails5.join(", ")})`);
      if (triggerSem?.droppedU > 3) issues.push(`${triggerSem.droppedU} units dropped (>3 limit)`);
      if (triggerSem?.semGwa > gwaReq) issues.push(`GWA ${triggerSem.semGwa.toFixed(2)} (required ≤ ${gwaReq})`);
      reason = `One or more scholarship condition(s) violated in Year ${triggerSem?.y} Sem ${triggerSem?.s}: ${issues.join("; ")}.`;
    } else if (finalStatus === "PARTIAL") {
      reason = `Scholar remains eligible but qualifies for reduced benefits. Trigger: ${matchedPolicy.rule} — previous deficiency on record: ${pd?"Yes":"No"}.`;
    }
  }

  const currentGwa = computeGWA();

  return {
    status: finalStatus,
    gwa: currentGwa,
    reason, rule, action,
    semData,
    triggerSem,
    matchedPolicy,
    rules,
    lastEvalDate: new Date().toLocaleDateString("en-PH",{year:"numeric",month:"long",day:"numeric"}),
  };
}

const SCHOL_STATUS_UI = {
  CONTINUED: {label:"Continued",color:"#16a34a",bg:"#dcfce7",border:"#86efac",icon:"✅"},

      ${STATE.simMode?`<button onclick="clearSimGrades()" style="padding:7px 12px;border-radius:9px;border:1px solid #d1d5db;background:#fff;cursor:pointer;font-size:12px">Clear All Sim</button>`:""}

function toggleSimMode() {
  STATE.simMode = !STATE.simMode;
  saveState();
  renderTab("whatif");
  updateTopBadges();
}
function clearSimGrades() {
  STATE.simGrades = {};
  saveState();
  renderTab("whatif");
}
function setSimGrade(code, label) {
  const found = GRADE_OPTIONS.find(g=>g.label===label);
  STATE.simGrades[code] = found||{label:"In Progress",num:null};
  saveState();
  updateTopBadges();
}

function renderFlowchart(el) {
  const audit = computeAudit();
  const sel = STATE.selectedAudit ? audit.find(c=>c.code===STATE.selectedAudit) : null;

  // Build retake overlay: code -> retake info
  const retakeOverlay = {};
  (STATE.retakeRecords||[]).forEach(r => {
    if (r.placedAy && r.placedSem) retakeOverlay[r.code] = r;
  });

  let html = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">
    <div class="section-title" style="margin:0">🗺️ Curriculum Flowchart</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap">
      ${[["passed","✓ Passed","#16a34a"],["available","→ Available","#2563eb"],["blocked","🔒 Blocked","#9ca3af"],["failed","✗ Failed","#dc2626"],["in_progress","◉ In Progress","#ca8a04"]].map(([s,l,c])=>`<span style="font-size:10px;color:${c};padding:2px 7px;background:${statusBg(s)};border-radius:7px;border:1px solid ${c}40">${l}</span>`).join("")}
      ${Object.keys(retakeOverlay).length>0?`<span style="font-size:10px;color:#7c3aed;padding:2px 7px;background:#ede9fe;border-radius:7px;border:1px solid #c4b5fd40">🔁 Retake</span>`:""}
    </div>
  </div>`;

  // Selected course detail panel
  if (sel) {
    // Find courses that depend on this one (postrequisites)
    const postreqs = COURSES.filter(c=>c.prereq.includes(sel.code)).map(c=>c.code);
    html += `<div class="card" style="border:2px solid #7B1113;margin-bottom:12px">
      <div style="display:flex;justify-content:space-between">
        <div>
          <div style="font-weight:800;font-size:15px;color:#7B1113">${sel.code} — ${sel.title}</div>
          <div style="font-size:12px;color:#6b7280;margin-top:3px">${sel.units}u | Year ${sel.year} Sem ${sel.sem} | <span style="font-weight:700;color:${statusColor(sel.status)}">${sel.status.replace("_"," ")}</span></div>
          ${sel.prereq.length?`<div style="font-size:12px;margin-top:3px">⬆ Prerequisites: <b>${sel.prereq.join(", ")}</b></div>`:""}
          ${sel.coreq.length?`<div style="font-size:12px">↔ Corequisites: <b>${sel.coreq.join(", ")}</b></div>`:""}
          ${postreqs.length?`<div style="font-size:12px;color:#1d4ed8">⬇ Unlocks: <b>${postreqs.join(", ")}</b></div>`:""}
          ${sel.blockedBy?.length?`<div style="font-size:12px;color:#dc2626">🔒 Blocked by: <b>${sel.blockedBy.join(", ")}</b></div>`:""}
          ${sel.needsME100Units?`<div style="font-size:12px;color:#dc2626">⚠️ Additional Requirement: Must have passed 63 units of ME courses (${sel.passedMEUnits}/63 units met)</div>`:""}
          ${sel.needsME113Taken?`<div style="font-size:12px;color:#dc2626">⚠️ Additional Requirement: Must have taken ME 71, ME 133, ME 146, ME 152, and ME 163 (missing: ${sel.me113MissingTaken.join(", ")})</div>`:""}
          ${sel.grade?.label&&sel.grade.label!=="In Progress"?`<div style="font-size:12px;font-weight:700;color:${gradeColor(sel.grade)}">Grade: ${sel.grade.label}</div>`:""}
          ${retakeOverlay[sel.code]?`<div style="font-size:11px;color:#7c3aed;margin-top:3px">🔁 Retake planned: ${retakeOverlay[sel.code].placedAy} ${retakeOverlay[sel.code].placedSem}</div>`:""}
        </div>
        <button onclick="STATE.selectedAudit=null;renderTab('flowchart')" style="background:transparent;border:none;font-size:20px;cursor:pointer;color:#9ca3af">×</button>
      </div>
    </div>`;
  }

  // ── MAIN FLOWCHART GRID ───────────────────────────────────────────
  // Auto-sort: for each year/sem column, sort courses by prereq depth
  // so courses higher in the chain appear at top
  function prereqDepth(code, memo={}) {
    if (memo[code] !== undefined) return memo[code];
    const c = COURSES.find(x=>x.code===code);
    if (!c || c.prereq.length===0) { memo[code]=0; return 0; }
    memo[code] = 1 + Math.max(...c.prereq.map(p=>prereqDepth(p,memo)));
    return memo[code];
  }
  const depthMemo = {};
  COURSES.forEach(c=>prereqDepth(c.code, depthMemo));

  html += `<div style="display:flex;gap:12px;overflow-x:auto;padding-bottom:12px;justify-content:center;min-width:0">`;
  for (let y=1;y<=4;y++) {
    html += `<div class="flow-col">
      <div style="text-align:center;font-weight:700;font-size:12px;color:#7B1113;padding:7px 0;background:#fff0f0;border-radius:8px 8px 0 0;border:1px solid #fca5a580;border-bottom:none;letter-spacing:.2px">Year ${y}</div>`;
    for (let s=1;s<=2;s++) {
      // Sort courses in this slot by prereq depth, then by code
      const courses = audit
        .filter(c=>c.year===y&&c.sem===s)
        .slice()
        .sort((a,b)=>(depthMemo[a.code]||0)-(depthMemo[b.code]||0)||(a.code.localeCompare(b.code)));
      html += `<div class="flow-sem" style="border-radius:${s===2?"0 0 8px 8px":"0"};${s===2?"border-top:1px dashed #d1d5db":""};margin-bottom:${s===2?8:0}px">
        <div style="font-size:10px;font-weight:700;color:#9ca3af;margin-bottom:5px">SEM ${s}</div>`;
      courses.forEach(c=>{
        const sc = statusColor(c.status), sb = statusBg(c.status);
        const isSel = STATE.selectedAudit===c.code;
        const hasRetake = retakeOverlay[c.code];
        // Show prereq arrows inline
        const prereqDone = c.prereq.filter(p=>{const pa=audit.find(a=>a.code===p);return pa&&pa.status==="passed";});
        const prereqMissing = c.prereq.filter(p=>{const pa=audit.find(a=>a.code===p);return !pa||pa.status!=="passed";});
        const flowR=(STATE.electiveNames||{})[c.code];
        const flowCode=flowR?.displayCode||c.code;
        const flowTitle=flowR?.displayName||c.title;
        html += `<div class="flow-chip" onclick="toggleAuditFlow('${c.code}')"
          style="background:${isSel?sb:"transparent"};border-color:${isSel?sc:"transparent"};outline:${isSel?"2px solid "+sc:"none"}"
          title="${flowTitle}${c.prereq.length?' | Pre: '+c.prereq.join(', '):''}">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <span style="font-size:10px;font-weight:700;color:${sc}">${flowCode}</span>
            <div style="display:flex;gap:2px;align-items:center">
              ${hasRetake?`<span style="font-size:8px;color:#7c3aed" title="Retake planned">🔁</span>`:""}
              <span style="font-size:9px;background:${sb};color:${sc};padding:1px 4px;border-radius:5px">${c.units}u</span>
            </div>
          </div>
          <div style="font-size:9px;color:#6b7280">${flowTitle.length>24?flowTitle.slice(0,24)+"…":flowTitle}</div>
          ${c.grade?.num!==null&&c.grade?.label!=="In Progress"?`<div style="font-size:9px;font-weight:700;color:${gradeColor(c.grade)}">${c.grade.label}</div>`:""}
          ${c.prereq.length?`<div style="font-size:8px;color:${prereqMissing.length?"#dc2626":"#9ca3af"};margin-top:1px">${prereqMissing.length?"🔒 ":"↑ "}${c.prereq.join(", ")}</div>`:""}
        </div>`;
        // Show retake entry below original if it exists
        if (hasRetake) {
          const rk = hasRetake;
          const rStatus = rk.retakeStatus||"planned";
          const rColor = rStatus==="completed"?"#16a34a":rStatus==="in_progress"?"#ca8a04":"#7c3aed";
          html += `<div style="margin-left:8px;padding:3px 7px;border-radius:5px;background:#ede9fe;border:1px solid #c4b5fd;margin-bottom:3px">
            <div style="font-size:9px;font-weight:700;color:#7c3aed">🔁 ${c.code} (Retake)</div>
            <div style="font-size:8px;color:#6b7280">${rk.placedAy||""} ${rk.placedSem||""}</div>
            <div style="font-size:8px;font-weight:700;color:${rColor}">${rStatus.charAt(0).toUpperCase()+rStatus.slice(1)}</div>
          </div>`;
        }
      });
      html += "</div>";
    }
    html += "</div>";
  }
  html += "</div>";

  // Legend footer
  html += `<div class="card" style="margin-top:4px;font-size:11px;color:#6b7280">
    <b>How to read:</b> Click any course chip to see its prerequisites, what it unlocks, and retake status. Courses are sorted by prerequisite depth within each semester. 🔒 = missing prerequisite listed below chip. ⬇ Unlocks = courses this one enables.
  </div>`;

  el.innerHTML = html;
}

function toggleAuditFlow(code) {
  STATE.selectedAudit = STATE.selectedAudit===code?null:code;
  renderTab("flowchart");
}

// Resolve a planner code to a course-like object (curriculum or custom)
function getCourseOrCustom(code) {
  if (code.startsWith("custom__")) {
    const id = +code.replace("custom__","");
    const cc = (STATE.customCourses||[]).find(c=>c.id===id);
    if (!cc) return null;
    return {code:"custom__"+cc.id, displayCode:cc.code, title:cc.title, units:cc.units, type:cc.type||"custom", isCustom:true, customId:cc.id};
  }
  const c = COURSES.find(x=>x.code===code);
  if (!c) return null;
  return {...c, displayCode:c.code, isCustom:false};
}
